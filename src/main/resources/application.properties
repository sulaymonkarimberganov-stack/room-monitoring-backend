spring.application.name=app

# PostgreSQL - using individual PG variables
spring.datasource.url=jdbc:postgresql://${PGHOST:127.0.0.1}:${PGPORT:5432}/${PGDATABASE:room_monitoring}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:2211}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Server port
server.port=${PORT:8080}

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# JWT
jwt.secret=${JWT_SECRET:room-monitoring-secret-key-must-be-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
