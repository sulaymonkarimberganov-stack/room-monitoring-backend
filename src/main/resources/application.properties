spring.application.name=app

# PostgreSQL - Railway environment variables ishlatadi
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/room_monitoring}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:2211}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port - Railway PORT env ishlatadi
server.port=${PORT:8080}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# JWT
jwt.secret=${JWT_SECRET:room-monitoring-secret-key-must-be-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
