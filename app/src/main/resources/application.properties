spring.application.name=app

# Server port - Railway provides PORT environment variable
server.port=${PORT:8080}

# Actuator - expose health endpoint for Railway healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Database Configuration - PUBLIC ENDPOINT
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://shuttle.proxy.rlwy.net:49209/railway}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:DzkGNEAHsBTLCoSTWCMEuebEaCrKuShh}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=room-monitoring-secret-key-for-jwt-token-generation-minimum-256-bits
jwt.expiration=86400000
